services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-divine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-divine}
      POSTGRES_DB: ${POSTGRES_DB:-divine_arsenal}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-divine}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - uploads-data:/app/uploads
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://divine:divine@db:5432/divine_arsenal?schema=public}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      PORT: 4000
      NODE_ENV: production
      UPLOADS_DIR: /app/uploads
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}

volumes:
  postgres-data:
  uploads-data:
