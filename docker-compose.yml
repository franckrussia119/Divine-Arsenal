services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-divine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-divine}
      POSTGRES_DB: ${POSTGRES_DB:-divine_arsenal}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-divine}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://divine:divine@db:5432/divine_arsenal?schema=public}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      PORT: 4000
      NODE_ENV: production

volumes:
  postgres-data:
